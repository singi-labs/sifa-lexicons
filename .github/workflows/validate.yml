name: Validate Lexicons

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate types from lexicon schemas
        run: npm run generate

      - name: Build TypeScript
        run: npm run build

      - name: Verify authProfileAccess.json is valid JSON
        run: python3 -c "import json, sys; json.load(open(sys.argv[1]))" lexicons/id/sifa/authProfileAccess.json
