name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Generate types
        run: npm run generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Format Check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Validate lexicon JSON
        run: python3 -c "import json, sys; json.load(open(sys.argv[1]))" lexicons/id/sifa/authProfileAccess.json
